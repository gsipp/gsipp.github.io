name: Keep Supabase Alive

on:
  schedule:
    # Roda todos os dias à meia-noite (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite rodar manualmente se necessário

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Website
        run: |
          curl -I https://gsipp.github.io
          echo "Keep-alive ping sent to gsipp.github.io"
